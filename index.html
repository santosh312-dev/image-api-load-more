<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Image Search App</h1>

            <input type="text" class="inputBox" placeholder="Enter keywords..." required />

        </form>
        <div class="main"></div>
        <button class="showMore">Load More</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
